syntax = "proto3";

option java_package = "io.multinet.mobility.datastore";
option java_multiple_files = true;

message MobilitySettings {
  bool mode_enabled = 1;
  bool intro_completed = 2;
  reserved 3;
  reserved "wifi_profiles";
  CellularPolicy cellular_policy = 4;
  bool diagnostics_unlocked = 5;
  bool legacy_enabled_state_migrated = 6;
}

enum CellularPolicy {
  CELLULAR_POLICY_UNSPECIFIED = 0;
  CELLULAR_POLICY_BALANCED = 1;
}
